name: Sync Logs

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC
    - cron: '0 6 * * *'   # 06:00 UTC
    - cron: '0 12 * * *'  # 12:00 UTC
    - cron: '0 18 * * *'  # 18:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: 'sync-logs'
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch logs export
        env:
          APP_URL: ${{ secrets.APP_URL }}
          LOGS_ENDPOINT: ${{ secrets.LOGS_ENDPOINT }}
        run: |
          set -euo pipefail
          mkdir -p logs
          ENDPOINT="${LOGS_ENDPOINT:-${APP_URL}/api/cron/export-logs}"
          echo "Fetching logs from $ENDPOINT"
          # Save full export to a single file first
          curl -fsS "$ENDPOINT" -o logs/all.json

      - name: Split into per-host files
        run: |
          set -euo pipefail
          node <<'NODE'
            const fs = require('fs');
            const path = require('path');
            const inputPath = 'logs/all.json';
            if (!fs.existsSync(inputPath)) { console.error('no logs file'); process.exit(1); }
            const raw = fs.readFileSync(inputPath, 'utf8');
            let data;
            try { data = JSON.parse(raw); } catch(e){ console.error('Invalid JSON', e); process.exit(1); }
            function hostnameFromUrl(url){ try { return new URL(url).hostname; } catch(e){ return String(url).replace(/[^a-z0-9]/gi,'-').toLowerCase(); } }
            if (Array.isArray(data)) {
              const groups = {};
              data.forEach(e => {
                const host = e.host || (e.url && hostnameFromUrl(e.url)) || 'unknown';
                if (!groups[host]) groups[host] = { meta: { host }, entries: [] };
                groups[host].entries.push(e);
              });
              for (const host of Object.keys(groups)) {
                fs.writeFileSync(path.join('logs', host + '.json'), JSON.stringify(groups[host], null, 2));
              }
            } else if (data && typeof data === 'object') {
              const keys = Object.keys(data);
              const hostKeyPattern = /^[a-z0-9.-]+$/i;
              const allHostLike = keys.length > 0 && keys.every(k => hostKeyPattern.test(k));
              if (allHostLike) {
                for (const k of keys) {
                  fs.writeFileSync(path.join('logs', k + '.json'), JSON.stringify(data[k], null, 2));
                }
              } else if (Array.isArray(data.logs)) {
                const groups = {};
                data.logs.forEach(e => {
                  const host = e.host || (e.url && hostnameFromUrl(e.url)) || 'unknown';
                  if (!groups[host]) groups[host] = { meta: { host }, entries: [] };
                  groups[host].entries.push(e);
                });
                for (const host of Object.keys(groups)) {
                  fs.writeFileSync(path.join('logs', host + '.json'), JSON.stringify(groups[host], null, 2));
                }
              } else {
                // fallback: save raw object
                fs.writeFileSync(path.join('logs', 'all.json'), JSON.stringify(data, null, 2));
              }
            } else {
              console.error('Unexpected data format');
              process.exit(1);
            }
          NODE

      - name: Commit and push logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add logs || true
          if git diff --staged --quiet; then
            echo "No log changes to commit"
            exit 0
          fi
          git commit -m "Sync logs: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # push into main branch (persist logs to repository)
          git push origin "HEAD:refs/heads/main"
